<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasha - Graphic & Website Designer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Montserrat:wght@700,800,900&family=DM+Sans:wght@400,500,600&family=Poppins:wght@900&display=swap" rel="stylesheet">
</head>
<body>
 
    <!-- Navigation -->
    <nav>
        <a href="#home" class="active">HOME</a>
        <a href="#about">ABOUT</a>
        <a href="#services">SERVICES</a>
        <a href="#portfolio">PORTFOLIO</a>
        <a href="#testimonials">TESTIMONIALS</a>
    </nav>
 
    <!-- Hero Section -->
    <section class="hero">
 
        <!-- "Graphic and Website" italic subtitle -->
        <div class="subtitle-row">
            <span>Graphic and Website</span>
        </div>
 
        <!-- Big pink DESIGNER background text -->
        <div class="designer-bg" aria-hidden="true">DESIGNER</div>
 
        <!-- Person photo (overlaps DESIGNER text) -->
        <div class="hero-photo">
            <img src="assets/Tasha-Hero.png" alt="Tasha - Designer">
        </div>
        </div>
 
        <!-- Bottom row: description left, skills right -->
        <div class="bottom-row">
            <p class="description">
                I'm a graphic and website designer with <strong>8 years</strong> of experience creating high-impact visuals for brands and businesses.
            </p>
 
            <div class="skills">
                <div class="skills-row">
                    <span class="skill-tag pink">Branding</span>
                    <span class="skill-tag">Social Media Graphics</span>
                </div>
                <div class="skills-row">
                    <span class="skill-tag">Website Design</span>
                    <div class="asterisk">✳</div>
                </div>
                <div class="skills-row">
                    <span class="skill-tag pink">Website Development</span>
                    <span class="skill-tag">UI/UX Design</span>
                </div>
            </div>
        </div>
 
        <!-- CTA -->
        <div class="cta-wrap">
            <button class="cta-button">Let's Chat</button>
        </div>
 
    </section>
 
</body>
</html>
